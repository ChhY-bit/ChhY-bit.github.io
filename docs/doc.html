<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- 引入 marked.js 用于渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="打开菜单">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
    </button>

    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 主题选择器 -->
    <div class="theme-switcher">
        <span class="theme-switcher-label">主题</span>
        <button class="theme-btn" data-theme="default" title="黑白">
            <span class="theme-tooltip">黑白</span>
        </button>
        <button class="theme-btn active" data-theme="light-blue" title="浅蓝">
            <span class="theme-tooltip">浅蓝</span>
        </button>
        <button class="theme-btn" data-theme="dark-blue" title="深蓝">
            <span class="theme-tooltip">深蓝</span>
        </button>
        <button class="theme-btn" data-theme="light-green" title="浅绿">
            <span class="theme-tooltip">浅绿</span>
        </button>
        <button class="theme-btn" data-theme="purple" title="紫色">
            <span class="theme-tooltip">紫色</span>
        </button>
        <button class="theme-btn" data-theme="orange" title="橙色">
            <span class="theme-tooltip">橙色</span>
        </button>
        <button class="theme-btn" data-theme="pink" title="粉色">
            <span class="theme-tooltip">粉色</span>
        </button>
    </div>

    <div class="container">
        <!-- 左侧导航栏（由 JS 动态渲染） -->
        <nav class="sidebar" id="doc-nav">
            <div class="loading-placeholder">
                正在加载...
            </div>
        </nav>

        <!-- 主内容区域 -->
        <main class="main-content doc-main">
            <div class="doc-content" id="doc-content">
                <div class="loading-placeholder">
                    正在加载文档内容...
                </div>
            </div>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script src="docs.js"></script>
</body>
</html>
