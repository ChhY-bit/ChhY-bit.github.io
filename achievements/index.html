<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术成果 - 个人主页</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- 移动端遮罩层 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 移动端汉堡菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="打开导航菜单">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
    </button>

    <!-- 主题选择器 -->
    <div class="theme-switcher">
        <span class="theme-switcher-label">主题</span>
        <button class="theme-btn" data-theme="default" title="黑白">
            <span class="theme-tooltip">黑白</span>
        </button>
        <button class="theme-btn active" data-theme="light-blue" title="浅蓝">
            <span class="theme-tooltip">浅蓝</span>
        </button>
        <button class="theme-btn" data-theme="dark-blue" title="深蓝">
            <span class="theme-tooltip">深蓝</span>
        </button>
        <button class="theme-btn" data-theme="light-green" title="浅绿">
            <span class="theme-tooltip">浅绿</span>
        </button>
        <button class="theme-btn" data-theme="purple" title="紫色">
            <span class="theme-tooltip">紫色</span>
        </button>
        <button class="theme-btn" data-theme="orange" title="橙色">
            <span class="theme-tooltip">橙色</span>
        </button>
        <button class="theme-btn" data-theme="pink" title="粉色">
            <span class="theme-tooltip">粉色</span>
        </button>
    </div>

    <div class="container">
        <!-- 左侧导航栏 -->
        <nav class="sidebar">
            <div class="profile-section">
                <div class="profile-photo">
                    <img src="../images/photo.jpg" alt="个人照片" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <span class="profile-photo-placeholder" style="display:none;">照片</span>
                </div>
                <div class="profile-name">C.Yang</div>
                <div class="profile-title">控制科学与工程</div>
                <div class="profile-degree">博士研究生在读</div>
                <div class="profile-degree">（2026-2032）</div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">返回主页</a>
                </li>
            </ul>
        </nav>

        <!-- 主内容区域 -->
        <main class="main-content">
            <a href="../index.html" class="back-link">← 返回主页</a>

            <section>
                <h1>学术成果</h1>
                <p class="section-desc">以下是本人发表的学术论文、专利及软件著作权等成果。</p>

                <!-- 成果列表（由 JS 动态渲染） -->
                <div class="achievement-list" id="achievement-list">
                    <p class="section-desc">正在加载...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script src="achievements.js"></script>
</body>
</html>
